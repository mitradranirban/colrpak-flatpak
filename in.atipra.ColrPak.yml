id: in.atipra.ColrPak
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: colrpak

sdk-extensions:
- org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/node22/bin
  build-args:
  - --share=network
  env:
    LD_LIBRARY_PATH: /app/lib:/usr/lib/x86_64-linux-gnu
    QT_PLUGIN_PATH: /app/lib/qt6/plugins
    npm_config_cache: /run/build/fontra-git-dependencies/flatpak-node/npm-cache
    PKG_CONFIG_PATH: /app/lib/pkgconfig:/app/share/pkgconfig:/usr/lib/pkgconfig

finish-args:
- --share=ipc
- --socket=x11
- --socket=wayland
- --device=dri
- --share=network
- --filesystem=host

modules:
  # Git dependencies for Fontra packages (Using Color-Support forks)
- name: fontra-git-dependencies
  buildsystem: simple
  sources:
  - type: git
    url: https://github.com/mitradranirban/fontra.git
    branch: fontra-color-support
    dest: fontra
    commit: 18b30297f078d870d61917207c00de623ef7a39f
  - type: git
    url: https://github.com/mitradranirban/fontra-compile.git
    branch: fontra-color-support
    dest: fontra-compile
    commit: 42d769fce71ea1122daf246547d368ebf4972063
  - type: git
    url: https://github.com/fontra/fontra-rcjk.git
    commit: f7bec5b5f18df0c0b63fbe9c1faf8bad9c4f2070
    dest: fontra-rcjk
  - type: git
    url: https://github.com/fontra/fontra-glyphs.git
    commit: e7024bc229e69250fb9f828813adcf6388f57eca
    dest: fontra-glyphs

  build-commands:
  - pip3 install --verbose --prefix=${FLATPAK_DEST}   ./fontra
  - pip3 install --verbose --prefix=${FLATPAK_DEST}   ./fontra-compile
  - pip3 install --verbose --prefix=${FLATPAK_DEST}  ./fontra-rcjk
  - pip3 install --verbose --prefix=${FLATPAK_DEST}   ./fontra-glyphs

  # PyPI dependencies generated by flatpak-pip-generator
- runtime-deps.json
 # Other PYPI depensancies missed by flatpakpip generator 
- name: python3-cattrs
  buildsystem: simple
  build-commands:
  - pip3 install --verbose --prefix=${FLATPAK_DEST} cattrs attrs
- name: python3-ufo2ft
  buildsystem: simple
  build-commands:
  - pip3 install --verbose --prefix=${FLATPAK_DEST} ufo2ft
- name: pyqt6
  buildsystem: simple
  build-commands:
  - pip3 install --verbose --prefix=${FLATPAK_DEST} PyQt6
  # Main ColrPak application
- name: colrpak
  buildsystem: simple
  sources:
  - type: git
    url: https://github.com/mitradranirban/colr-pak.git
    tag: v0.25
    commit: 256bed8dffc781caeaebb6975ce9c713b809e45c
  - type: file
    path: data/icons/in.atipra.ColrPak.svg
    dest-filename: in.atipra.ColrPak.svg
  - type: file
    path: in.atipra.ColrPak.desktop
    dest-filename: in.atipra.ColrPak.desktop
  - type: file
    path: in.atipra.ColrPak.metainfo.xml
    dest-filename: in.atipra.ColrPak.metainfo.xml
  build-commands:
      # Copy source into the app directory
  - mkdir -p ${FLATPAK_DEST}/share/colrpak
  - cp -a . ${FLATPAK_DEST}/share/colrpak/

      # Create the launcher wrapper script
  - install -d ${FLATPAK_DEST}/bin
  - |
    cat > ${FLATPAK_DEST}/bin/colrpak << 'EOF'
    #!/usr/bin/env sh
    export PYTHONPATH=/app/lib/python3.13/site-packages:/usr/lib/python3.13/site-packages:${PYTHONPATH}
    export LD_LIBRARY_PATH=/app/lib:/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH}
    cd /app/share/colrpak
    exec /usr/bin/python3 ColrPakMain.py "$@"
    EOF
  - chmod +x ${FLATPAK_DEST}/bin/colrpak

      # Install icon, desktop file and metainfo
  - install -Dm644 in.atipra.ColrPak.svg 
    ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/in.atipra.ColrPak.svg
  - install -Dm644 in.atipra.ColrPak.desktop 
    ${FLATPAK_DEST}/share/applications/in.atipra.ColrPak.desktop
  - install -Dm644 in.atipra.ColrPak.metainfo.xml 
    ${FLATPAK_DEST}/share/metainfo/in.atipra.ColrPak.metainfo.xml
