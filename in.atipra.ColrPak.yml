id: in.atipra.ColrPak
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: '6.10'
command: colrpak

sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22

build-options:
  append-path: /usr/lib/sdk/node22/bin
  build-args:
    - --share=network
  env:
    npm_config_cache: /run/build/fontra-git-dependencies/flatpak-node/npm-cache
    PYTHONPATH: /app/lib/python3.12/site-packages

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  # Git dependencies for Fontra packages (Using Color-Support forks)
  - name: fontra-git-dependencies
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/mitradranirban/fontra.git
        branch: fontra-color-support
        dest: fontra
      - type: git
        url: https://github.com/mitradranirban/fontra-compile.git
        branch: fontra-color-support
        dest: fontra-compile
      - type: git
        url: https://github.com/fontra/fontra-rcjk.git
        commit: 368f50050fe6cfbdfb46d37bb6bb0a58cba012ea
        dest: fontra-rcjk
      - type: git
        url: https://github.com/fontra/fontra-glyphs.git
        commit: 621bb929242fe45937000cc21670337cd824b5eb
        dest: fontra-glyphs
      - type: git
        url: https://github.com/justvanrossum/delocate.git
        commit: 84dbca9fd5c4feedd418e21a31ed4e9b581dff86
        dest: delocate
    build-commands:
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps ./fontra
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps ./fontra-compile
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps ./fontra-rcjk
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps ./fontra-glyphs
      - pip3 install --verbose --prefix=${FLATPAK_DEST} --no-deps ./delocate

  # PyPI dependencies generated by flatpak-pip-generator
  - pypi-dependencies.json

  # Main ColrPak application
  - name: colrpak
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/mitradranirban/colr-pak.git
        tag: 2025.12.2 # Placeholder, update as needed
      - type: file
        path: data/icons/in.atipra.ColrPak.svg
        dest-filename: in.atipra.ColrPak.svg
      - type: file
        path: in.atipra.ColrPak.desktop
        dest-filename: in.atipra.ColrPak.desktop
      - type: file
        path: in.atipra.ColrPak.metainfo.xml
        dest-filename: in.atipra.ColrPak.metainfo.xml
    build-commands:
      # Copy source into the app directory
      - mkdir -p ${FLATPAK_DEST}/share/colrpak
      - cp -a . ${FLATPAK_DEST}/share/colrpak/

      # Create the launcher wrapper script
      - install -d ${FLATPAK_DEST}/bin
      - |
        cat > ${FLATPAK_DEST}/bin/colrpak << 'EOF'
        #!/usr/bin/env sh
        export PYTHONPATH=/app/lib/python3.*/site-packages${PYTHONPATH:+:$PYTHONPATH}
        cd /app/share/colrpak
        exec /app/bin/python3 ColrPakMain.py "$@"
        EOF
      - chmod +x ${FLATPAK_DEST}/bin/colrpak

      # Install icon, desktop file and metainfo
      - install -Dm644 in.atipra.ColrPak.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/in.atipra.ColrPak.svg
      - install -Dm644 in.atipra.ColrPak.desktop ${FLATPAK_DEST}/share/applications/in.atipra.ColrPak.desktop
      - install -Dm644 in.atipra.ColrPak.metainfo.xml ${FLATPAK_DEST}/share/metainfo/in.atipra.ColrPak.metainfo.xml
