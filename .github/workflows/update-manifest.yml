name: Auto-Update Flatpak Git Hashes

on:
  repository_dispatch:
    types: [update-manifest]

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required so the bot can push the updated manifest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install YAML parser
        run: pip install ruamel.yaml

      - name: Fetch Latest Hashes and Update Manifest
        env:
          NEW_APP_TAG: ${{ github.event.client_payload.tag }}
        run: |
          python << 'EOF'
          import subprocess
          import sys
          import os
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.preserve_quotes = True
          
          # UPDATE THIS with your actual manifest filename
          manifest_file = 'in.atipra.ColrPak.yml'
          new_app_tag = os.environ.get('NEW_APP_TAG')

          try:
              with open(manifest_file, 'r') as f:
                  data = yaml.load(f)
          except FileNotFoundError:
              print(f"Error: {manifest_file} not found.")
              sys.exit(1)

          changed = False

          for module in data.get('modules', []):
              if isinstance(module, dict) and 'sources' in module:
                  for source in module['sources']:
                      if source.get('type') == 'git':
                          url = source.get('url')
                          
                          # If this is the main colr-pak source and we received a new tag, update it first
                          if 'colr-pak.git' in url and new_app_tag:
                              if source.get('tag') != new_app_tag:
                                  print(f"Updating {url} tag to {new_app_tag}")
                                  source['tag'] = new_app_tag
                                  changed = True
                          
                          # Determine what ref we are tracking
                          ref = 'HEAD'
                          if 'branch' in source:
                              ref = f"refs/heads/{source['branch']}"
                          elif 'tag' in source:
                              ref = f"refs/tags/{source['tag']}"
                              
                          # Ask the remote for the exact hash without cloning
                          cmd = ['git', 'ls-remote', url, ref]
                          result = subprocess.run(cmd, capture_output=True, text=True)
                          
                          if result.returncode == 0 and result.stdout.strip():
                              lines = result.stdout.strip().split('\n')
                              new_hash = lines[0].split()[0]
                              
                              # If using annotated tags, we need the peeled commit (ends in ^{})
                              for line in lines:
                                  if line.endswith('^{}'):
                                      new_hash = line.split()[0]
                                      break
                                      
                              if source.get('commit') != new_hash:
                                  print(f"Updating {url} commit from {source.get('commit')} to {new_hash}")
                                  source['commit'] = new_hash
                                  changed = True

          if changed:
              with open(manifest_file, 'w') as f:
                  yaml.dump(data, f)
              print("Manifest updated successfully.")
          else:
              print("All hashes are already up to date.")
          EOF

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add in.atipra.ColrPak.yml
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: Update manifest for colr-pak ${{ github.event.client_payload.tag }}"
            git push
          fi
