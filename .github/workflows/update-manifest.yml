name: Auto-Update Flatpak Git Hashes and PyPI

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [update-manifest]
  workflow_dispatch:

jobs:
  update-hashes:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install ruamel.yaml requirements-parser aiohttp

      - name: Fetch Latest Hashes and Update Manifest
        env:
          NEW_APP_TAG: ${{ github.event.client_payload.tag }}
        run: |
          python << 'EOF'
          import subprocess
          import sys
          import os
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.preserve_quotes = True

          manifest_file = 'in.atipra.ColrPak.yml'
          new_app_tag = os.environ.get('NEW_APP_TAG')

          try:
              with open(manifest_file, 'r') as f:
                  data = yaml.load(f)
          except FileNotFoundError:
              print(f"Error: {manifest_file} not found.")
              sys.exit(1)

          changed = False

          for module in data.get('modules', []):
              if isinstance(module, dict) and 'sources' in module:
                  for source in module['sources']:
                      if source.get('type') == 'git':
                          url = source.get('url')

                          if url and 'colr-pak.git' in url and new_app_tag:
                              if source.get('tag') != new_app_tag:
                                  print(f"Updating {url} tag to {new_app_tag}")
                                  source['tag'] = new_app_tag
                                  changed = True

                          ref = 'HEAD'
                          if 'branch' in source:
                              ref = f"refs/heads/{source['branch']}"
                          elif 'tag' in source:
                              ref = f"refs/tags/{source['tag']}"

                          cmd = ['git', 'ls-remote', url, ref]
                          result = subprocess.run(cmd, capture_output=True, text=True)

                          if result.returncode == 0 and result.stdout.strip():
                              lines = result.stdout.strip().splitlines()
                              new_hash = lines[0].split()[0]

                              for line in lines:
                                  if line.endswith('^{}'):
                                      new_hash = line.split()[0]
                                      break

                              if source.get('commit') != new_hash:
                                  print(f"Updating {url} commit from {source.get('commit')} to {new_hash}")
                                  source['commit'] = new_hash
                                  changed = True

          if changed:
              with open(manifest_file, 'w') as f:
                  yaml.dump(data, f)
              print("Manifest updated successfully.")
          else:
              print("All hashes are already up to date.")
          EOF

      - name: Install Flatpak and SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub org.freedesktop.Sdk//25.08

      - name: Generate PyPI Dependencies
        run: |
          # Extract the colr-pak commit hash from the updated manifest
          COMMIT=$(python -c '
          import sys
          from ruamel.yaml import YAML
          yaml = YAML()
          with open("in.atipra.ColrPak.yml", "r") as f:
              data = yaml.load(f)
          for m in data.get("modules", []):
              if isinstance(m, dict):
                  for s in m.get("sources", []):
                      if isinstance(s, dict) and s.get("type") == "git" and "colr-pak.git" in s.get("url", ""):
                          print(s.get("commit"))
                          sys.exit(0)
          ')

          if [ -z "$COMMIT" ]; then
            echo "Error: Could not find colr-pak commit hash in manifest."
            exit 1
          fi

          echo "Using Colr Pak commit: $COMMIT"
          curl -sSL "https://raw.githubusercontent.com/mitradranirban/colr-pak/${COMMIT}/requirements.txt" -o requirements.txt

          # Filter out git dependencies, editable install flags, and PyQt packages
          sed -E '/^(#|$)/d; /fontra/d; /fontra-compile/d; /fontra-glyphs/d; /fontra-rcjk/d; /delocate/d; /[Pp]y[Qq]t/d' requirements.txt > requirements-flatpak.txt

          echo "Filtered requirements:"
          cat requirements-flatpak.txt

          curl -o flatpak-pip-generator.py https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/pip/flatpak-pip-generator.py
          python flatpak-pip-generator.py --runtime='org.freedesktop.Sdk//25.08' --requirements-file=requirements-flatpak.txt --output pypi-dependencies
      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add in.atipra.ColrPak.yml pypi-dependencies.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TAG_MSG=${NEW_APP_TAG:-"latest"}
            git commit -m "chore: Update manifest and PyPI dependencies for colr-pak $TAG_MSG"
            git push
          fi
